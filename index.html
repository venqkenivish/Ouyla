<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <script>
    const saved = localStorage.getItem('ouyla_lang');
    const browser = navigator.language.slice(0, 2);
    const supported = ['en', 'ru', 'kz'];
    const lang = supported.includes(saved) ? saved
               : supported.includes(browser) ? browser
               : 'kz';
    window.location.replace(lang + '/index.html');
  </script>
</head>
<body></body>
</html>
